# Thunity Local AI Company OS — local stack. All services run on the founder's
# machine. No cloud services. Secrets come from .env (never committed).
networks:
  thunity-net:
    driver: bridge

volumes:
  ollama_data:
  n8n_data:
  postgres_data:
  redis_data:
  local_data:

services:
  # Container Ollama is OPT-IN via the "ollama" profile so it does NOT bind host
  # port 11434 by default. On a Mac, run host Ollama (`ollama serve`) and point
  # the backend at it with OLLAMA_URL=http://host.docker.internal:11434.
  # To run container Ollama (Linux/CPU):  docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    container_name: thunity-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports: ["127.0.0.1:11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    networks: [thunity-net]
    environment:
      - OLLAMA_HOST=0.0.0.0

  postgres:
    image: postgres:15-alpine
    container_name: thunity-postgres
    restart: unless-stopped
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    networks: [thunity-net]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=thunity_ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thunity_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thunity-redis
    restart: unless-stopped
    ports: ["127.0.0.1:6379:6379"]
    volumes: ["redis_data:/data"]
    networks: [thunity-net]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: thunity-n8n
    restart: unless-stopped
    ports: ["127.0.0.1:5678:5678"]
    volumes: ["n8n_data:/home/node/.n8n", "local_data:/data"]
    networks: [thunity-net]
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?set N8N_BASIC_AUTH_PASSWORD in .env}
      - DB_TYPE=sqlite

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: thunity-backend
    restart: unless-stopped
    ports: ["127.0.0.1:8000:8000"]
    # THUNITY_EXPORTS_DIR is the host folder the founder browses (Finder/Files).
    # Defaults to a portable in-repo path; on a Mac set it to e.g.
    # THUNITY_EXPORTS_DIR=~/Documents/thunity-conversations in .env. (Previously a
    # hard-coded /Users/aaa/... path leaked a username and broke on Linux.)
    # ./backend:/app is a DEV convenience (live source over the image); for an
    # immutable production image, remove it and rely on the Dockerfile COPY.
    volumes:
      - "local_data:/data"
      - "./backend:/app"
      - "${THUNITY_EXPORTS_DIR:-./data/exports}:/exports"
    networks: [thunity-net]
    env_file: [.env]
    environment:
      # Overridable: defaults to container Ollama, but Mac sets this to
      # http://host.docker.internal:11434 so the backend reaches host Ollama.
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - N8N_URL=http://n8n:5678
      - POSTGRES_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/thunity_ai
      - REDIS_URL=redis://redis:6379
    # ollama intentionally NOT in depends_on: it is profile-gated and reached
    # lazily over OLLAMA_URL, so the backend must not block on it at startup.
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
