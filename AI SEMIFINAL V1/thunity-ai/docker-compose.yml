# Thunity Local AI Company OS — local stack. All services run on the founder's
# machine. No cloud services. Secrets come from .env (never committed).
networks:
  thunity-net:
    driver: bridge

volumes:
  ollama_data:
  n8n_data:
  postgres_data:
  redis_data:
  local_data:

services:
  ollama:
    image: ollama/ollama:rocm
    container_name: thunity-ollama
    restart: unless-stopped
    ports: ["127.0.0.1:11434:11434"]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes: ["ollama_data:/root/.ollama"]
    networks: [thunity-net]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - HSA_OVERRIDE_GFX_VERSION=10.3.0

  postgres:
    image: postgres:15-alpine
    container_name: thunity-postgres
    restart: unless-stopped
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    networks: [thunity-net]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=thunity_ai

  redis:
    image: redis:7-alpine
    container_name: thunity-redis
    restart: unless-stopped
    ports: ["127.0.0.1:6379:6379"]
    volumes: ["redis_data:/data"]
    networks: [thunity-net]
    command: redis-server --appendonly yes

  n8n:
    image: n8nio/n8n:latest
    container_name: thunity-n8n
    restart: unless-stopped
    ports: ["127.0.0.1:5678:5678"]
    volumes: ["n8n_data:/home/node/.n8n", "local_data:/data"]
    networks: [thunity-net]
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?set N8N_BASIC_AUTH_PASSWORD in .env}
      - DB_TYPE=sqlite
            - WEBHOOK_URL=https://repugnant-rewrite-splendor.ngrok-free.dev
      - N8N_EDITOR_BASE_URL=https://repugnant-rewrite-splendor.ngrok-free.dev
      - N8N_HOST=repugnant-rewrite-splendor.ngrok-free.dev
      - N8N_PROTOCOL=https

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: thunity-backend
    restart: unless-stopped
    ports: ["127.0.0.1:8000:8000"]
    volumes: ["local_data:/data", "./backend:/app"]
    networks: [thunity-net]
    env_file: [.env]
    environment:
      - OLLAMA_URL=http://ollama:11434
      - N8N_URL=http://n8n:5678
      - POSTGRES_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/thunity_ai
      - REDIS_URL=redis://redis:6379

    depends_on: [ollama, postgres, redis]
