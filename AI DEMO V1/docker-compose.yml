
networks:
  ai-network:
    driver: bridge

volumes:
  ollama_data:
  n8n_data:
  postgres_data:
  local_files:
  redis_data:

services:

  # ─────────────────────────────────────────
  # OLLAMA - Local LLM Runner
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:rocm
    container_name: ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-network
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
      - HSA_OVERRIDE_GFX_VERSION=10.3.0

  # ─────────────────────────────────────────
  # N8N - Workflow Automation
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - local_files:/data/files
    networks:
      - ai-network
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - DB_TYPE=sqlite
      - N8N_RUNNERS_ENABLED=true
    depends_on:
      - postgres

  # ─────────────────────────────────────────
  # POSTGRESQL - Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai-network
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=ai_ecosystem

  # ─────────────────────────────────────────
  # REDIS - Cache & Message Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-network
    command: redis-server --appendonly yes

  # ─────────────────────────────────────────
  # BACKEND - Multi-Agent API (FastAPI)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - local_files:/data/files
      - ./backend:/app
    networks:
      - ai-network
    environment:
      - OLLAMA_URL=http://ollama:11434
      - N8N_URL=http://n8n:5678
      - POSTGRES_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/ai_ecosystem
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey123}
      - FILES_DIR=/data/files
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      - ollama
      - postgres
      - redis

  # ─────────────────────────────────────────
  # FRONTEND DASHBOARD - Admin Panel (Next.js)
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend-dashboard
      dockerfile: Dockerfile
    container_name: ai-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - ai-network
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # FRONTEND CHATBOT - Client Interface (Next.js)
  # ─────────────────────────────────────────
  chatbot:
    build:
      context: ./frontend-chatbot
      dockerfile: Dockerfile
    container_name: ai-chatbot
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - ai-network
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # NGINX - Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - ai-network
    depends_on:
      - backend
      - dashboard
      - chatbot
